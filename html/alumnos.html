<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Gestión de Alumnos</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
display:flex;
background:#f4f6f9;
}

/* MENU LATERAL */

.sidebar{
width:230px;
height:100vh;
background:#1e293b;
color:white;
padding:20px;
}

.sidebar h2{
text-align:center;
margin-bottom:30px;
}

.sidebar a{
display:block;
padding:10px;
margin:5px 0;
color:white;
text-decoration:none;
border-radius:5px;
}

.sidebar a:hover{
background:#334155;
}

/* CONTENIDO */

.main{
flex:1;
padding:30px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
margin-bottom:20px;
}

input{
padding:8px;
margin:5px;
border:1px solid #ccc;
border-radius:5px;
}

button{
padding:8px 15px;
border:none;
border-radius:5px;
background:#2563eb;
color:white;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

.delete{
background:#dc2626;
}

.delete:hover{
background:#b91c1c;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
padding:12px;
border-bottom:1px solid #ddd;
text-align:center;
}

th{
background:#2563eb;
color:white;
}

</style>

</head>

<body>

<div class="sidebar">

<h2>Sistema U</h2>

<a href="#">Dashboard</a>
<a href="">Administradores</a>
<a href="alumnos_get.html">Alumnos</a>
<a href="#">Docentes</a>
<a href="#">Carreras</a>
<a href="#">Materias</a>
<a href="#">Inscripciones</a>

</div>

<div class="main">

<h1>Gestión de Alumnos</h1>

<div class="card">

<h3>Registrar Alumno</h3>

<form id="formAlumno">

<input type="number" id="id_persona" placeholder="ID Persona" required>

<input type="number" id="carrera_alumno" placeholder="ID Carrera" required>

<button type="submit">Registrar</button>

</form>

</div>

<div class="card">

<h3>Lista de Alumnos</h3>

<button onclick="cargarAlumnos()">Actualizar Lista</button>

<table>

<thead>
<tr>
<th>ID Alumno</th>
<th>ID Persona</th>
<th>Carrera</th>
<th>Acciones</th>
</tr>
</thead>

<tbody id="tablaAlumnos"></tbody>

</table>

</div>

</div>

<script>

const url="http://127.0.0.1:8000/alumno"

async function cargarAlumnos(){

const response=await fetch(url)

const data=await response.json()

const tabla=document.getElementById("tablaAlumnos")

tabla.innerHTML=""

data.forEach(alumno=>{

tabla.innerHTML+=`

<tr>

<td>${alumno.id_alumno}</td>
<td>${alumno.id_persona}</td>
<td>${alumno.carrera_alumno}</td>

<td>

<button onclick="eliminarAlumno(${alumno.id_alumno})" class="delete">
Eliminar
</button>

</td>

</tr>

`

})

}

document.getElementById("formAlumno").addEventListener("submit",async(e)=>{

e.preventDefault()

const id_persona=document.getElementById("id_persona").value
const carrera=document.getElementById("carrera_alumno").value

await fetch(url,{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
id_persona:id_persona,
carrera_alumno:carrera
})

})

cargarAlumnos()

})

async function eliminarAlumno(id){

await fetch(url+"/"+id,{
method:"DELETE"
})

cargarAlumnos()

}

cargarAlumnos()

</script>

</body>
</html>
