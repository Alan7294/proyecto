<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Gestión de Inscripciones</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
display:flex;
background:#f4f6f9;
}

.sidebar{
width:230px;
height:100vh;
background:#1e293b;
color:white;
padding:20px;
}

.sidebar h2{
text-align:center;
margin-bottom:30px;
}

.sidebar a{
display:block;
padding:10px;
margin:5px 0;
color:white;
text-decoration:none;
border-radius:5px;
}

.sidebar a:hover{
background:#334155;
}

.main{
flex:1;
padding:30px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
margin-bottom:20px;
}

input{
padding:8px;
margin:5px;
border:1px solid #ccc;
border-radius:5px;
}

button{
padding:8px 15px;
border:none;
border-radius:5px;
background:#2563eb;
color:white;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

.delete{
background:#dc2626;
}

.delete:hover{
background:#b91c1c;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
padding:12px;
border-bottom:1px solid #ddd;
text-align:center;
}

th{
background:#2563eb;
color:white;
}

</style>

</head>

<body>

<div class="sidebar">

<h2>Sistema U</h2>

<a href="#">Dashboard</a>
<a href="#">Administradores</a>
<a href="#">Alumnos</a>
<a href="#">Docentes</a>
<a href="#">Carreras</a>
<a href="#">Materias</a>
<a href="#">Inscripciones</a>

</div>

<div class="main">

<h1>Gestión de Inscripciones</h1>

<div class="card">

<h3>Registrar Inscripción</h3>

<form id="formInscripcion">

<input type="number" id="id_alumno" placeholder="ID Alumno" required>

<input type="number" id="id_materia" placeholder="ID Materia" required>

<button type="submit">Registrar</button>

</form>

</div>

<div class="card">

<h3>Lista de Inscripciones</h3>

<button onclick="cargarInscripciones()">Actualizar Lista</button>

<table>

<thead>
<tr>
<th>ID</th>
<th>ID Alumno</th>
<th>ID Materia</th>
<th>Acciones</th>
</tr>
</thead>

<tbody id="tablaInscripciones"></tbody>

</table>

</div>

</div>

<script>

const url="http://127.0.0.1:8000/inscripcion"

async function cargarInscripciones(){

const response=await fetch(url)

const data=await response.json()

const tabla=document.getElementById("tablaInscripciones")

tabla.innerHTML=""

data.forEach(inscripcion=>{

tabla.innerHTML+=`

<tr>

<td>${inscripcion.id_inscripcion}</td>
<td>${inscripcion.id_alumno}</td>
<td>${inscripcion.id_materia}</td>

<td>

<button onclick="eliminarInscripcion(${inscripcion.id_inscripcion})" class="delete">
Eliminar
</button>

</td>

</tr>

`

})

}

document.getElementById("formInscripcion").addEventListener("submit",async(e)=>{

e.preventDefault()

const alumno=document.getElementById("id_alumno").value
const materia=document.getElementById("id_materia").value

await fetch(url,{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
id_alumno:alumno,
id_materia:materia
})

})

cargarInscripciones()

})

async function eliminarInscripcion(id){

await fetch(url+"/"+id,{
method:"DELETE"
})

cargarInscripciones()

}

cargarInscripciones()

</script>

</body>
</html>
