<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Gestión de Especialidades</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
display:flex;
background:#f4f6f9;
}

/* SIDEBAR */

.sidebar{
width:230px;
height:100vh;
background:#1e293b;
color:white;
padding:20px;
}

.sidebar h2{
text-align:center;
margin-bottom:30px;
}

.sidebar a{
display:block;
padding:10px;
margin:5px 0;
color:white;
text-decoration:none;
border-radius:5px;
}

.sidebar a:hover{
background:#334155;
}

/* CONTENIDO */

.main{
flex:1;
padding:30px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
margin-bottom:20px;
}

input{
padding:8px;
margin:5px;
border:1px solid #ccc;
border-radius:5px;
}

button{
padding:8px 15px;
border:none;
border-radius:5px;
background:#2563eb;
color:white;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

.delete{
background:#dc2626;
}

.delete:hover{
background:#b91c1c;
}

.update{
background:#16a34a;
}

.update:hover{
background:#15803d;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
padding:12px;
border-bottom:1px solid #ddd;
text-align:center;
}

th{
background:#2563eb;
color:white;
}

</style>

</head>

<body>

<div class="sidebar">

<h2>Sistema U</h2>

<a href="#">Dashboard</a>
<a href="#">Administradores</a>
<a href="#">Alumnos</a>
<a href="#">Docentes</a>
<a href="#">Carreras</a>
<a href="#">Materias</a>
<a href="#">Clases</a>
<a href="#">Especialidades</a>

</div>

<div class="main">

<h1>Gestión de Especialidades</h1>

<div class="card">

<h3>Registrar Especialidad</h3>

<form id="formEspecialidad">

<input type="text" id="nombre_especialidad" placeholder="Nombre de la especialidad" required>

<button type="submit">Registrar</button>

</form>

</div>

<div class="card">

<h3>Lista de Especialidades</h3>

<button onclick="cargarEspecialidades()">Actualizar Lista</button>

<table>

<thead>
<tr>
<th>ID Especialidad</th>
<th>Nombre Especialidad</th>
<th>Acciones</th>
</tr>
</thead>

<tbody id="tablaEspecialidades"></tbody>

</table>

</div>

</div>

<script>

const url="http://127.0.0.1:8000/especialidades"

async function cargarEspecialidades(){

const response=await fetch(url)

const data=await response.json()

const tabla=document.getElementById("tablaEspecialidades")

tabla.innerHTML=""

data.forEach(especialidad=>{

tabla.innerHTML+=`

<tr>

<td>${especialidad.id_especialidad}</td>
<td>${especialidad.nombre_especialidad}</td>

<td>

<button onclick="editarEspecialidad(${especialidad.id_especialidad},'${especialidad.nombre_especialidad}')" class="update">
Editar
</button>

<button onclick="eliminarEspecialidad(${especialidad.id_especialidad})" class="delete">
Eliminar
</button>

</td>

</tr>

`

})

}

document.getElementById("formEspecialidad").addEventListener("submit",async(e)=>{

e.preventDefault()

const nombre=document.getElementById("nombre_especialidad").value

await fetch(url,{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
nombre_especialidad:nombre
})

})

document.getElementById("formEspecialidad").reset()

cargarEspecialidades()

})

async function eliminarEspecialidad(id){

await fetch(url+"/"+id,{
method:"DELETE"
})

cargarEspecialidades()

}

function editarEspecialidad(id,nombre){

const nuevo=prompt("Nuevo nombre de la especialidad:",nombre)

if(nuevo){

fetch(url+"/"+id,{

method:"PUT",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
nombre_especialidad:nuevo
})

}).then(()=>cargarEspecialidades())

}

}

cargarEspecialidades()

</script>

</body>
</html>
