<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Gestión de Usuarios</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
display:flex;
background:#f4f6f9;
}

/* MENU LATERAL */

.sidebar{
width:230px;
height:100vh;
background:#1e293b;
color:white;
padding:20px;
}

.sidebar h2{
text-align:center;
margin-bottom:30px;
}

.sidebar a{
display:block;
padding:10px;
margin:5px 0;
color:white;
text-decoration:none;
border-radius:5px;
}

.sidebar a:hover{
background:#334155;
}

/* CONTENIDO */

.main{
flex:1;
padding:30px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
margin-bottom:20px;
}

input{
padding:8px;
margin:5px;
border:1px solid #ccc;
border-radius:5px;
}

button{
padding:8px 15px;
border:none;
border-radius:5px;
background:#2563eb;
color:white;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

.delete{
background:#dc2626;
}

.delete:hover{
background:#b91c1c;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
padding:12px;
border-bottom:1px solid #ddd;
text-align:center;
}

th{
background:#2563eb;
color:white;
}

</style>

</head>

<body>

<div class="sidebar">

<h2>Sistema U</h2>

<a href="#">Dashboard</a>
<a href="#">Personas</a>
<a href="#">Usuarios</a>
<a href="#">Alumnos</a>
<a href="#">Docentes</a>
<a href="#">Carreras</a>
<a href="#">Materias</a>
<a href="#">Inscripciones</a>
<a href="#">Notas</a>

</div>

<div class="main">

<h1>Gestión de Usuarios</h1>

<div class="card">

<h3>Registrar Usuario</h3>

<form id="formUsuario">

<input type="number" id="id_persona" placeholder="ID Persona" required>

<input type="text" id="nombre" placeholder="Nombre de Usuario" required>

<input type="password" id="contrasena" placeholder="Contraseña" required>

<input type="number" id="id_tipo" placeholder="ID Tipo Usuario" required>

<button type="submit">Registrar</button>

</form>

</div>

<div class="card">

<h3>Lista de Usuarios</h3>

<button onclick="cargarUsuarios()">Actualizar Lista</button>
<button onclick="reporteUsuarios()">Ver Reporte</button>

<table>

<thead>
<tr>
<th>ID</th>
<th>ID Persona</th>
<th>Usuario</th>
<th>Tipo</th>
<th>Acciones</th>
</tr>
</thead>

<tbody id="tablaUsuarios"></tbody>

</table>

</div>

</div>

<script>

const url="http://127.0.0.1:8000/usuario"

async function cargarUsuarios(){

const response=await fetch(url)

const data=await response.json()

const tabla=document.getElementById("tablaUsuarios")

tabla.innerHTML=""

data.forEach(usuario=>{

tabla.innerHTML+=`

<tr>

<td>${usuario.id_usuario}</td>
<td>${usuario.id_persona}</td>
<td>${usuario.nombre}</td>
<td>${usuario.id_tipo}</td>

<td>

<button onclick="eliminarUsuario(${usuario.id_usuario})" class="delete">
Eliminar
</button>

</td>

</tr>

`

})

}

async function reporteUsuarios(){

const response=await fetch(url+"/infoUsuarios")

const data=await response.json()

const tabla=document.getElementById("tablaUsuarios")

tabla.innerHTML=""

data.forEach(usuario=>{

tabla.innerHTML+=`

<tr>

<td>${usuario.id_usuario}</td>
<td>${usuario.nombre_persona}</td>
<td>${usuario.nombre_usuario}</td>
<td>${usuario.id_tipo}</td>

<td>-</td>

</tr>

`

})

}

document.getElementById("formUsuario").addEventListener("submit",async(e)=>{

e.preventDefault()

const id_persona=document.getElementById("id_persona").value
const nombre=document.getElementById("nombre").value
const contrasena=document.getElementById("contrasena").value
const id_tipo=document.getElementById("id_tipo").value

await fetch(url,{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
id_persona:id_persona,
nombre:nombre,
contraseña:contrasena,
id_tipo:id_tipo
})

})

cargarUsuarios()

})

async function eliminarUsuario(id){

await fetch(url+"/"+id,{
method:"DELETE"
})

cargarUsuarios()

}

cargarUsuarios()

</script>

</body>
</html>
