<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Notas</title>
</head>
<body>
    <form name="formularioData" action="" method="post">
        <h1>Registro de Nota</h1>
        
        <label for="id_inscripcion">ID Inscripción:</label>
        <input id="id_inscripcion" name="id_inscripcion" type="number"><br><br>

        <label for="nota">Nota (0-100):</label>
        <input id="nota" name="nota" type="number" step="0.01" min="0" max="100"><br><br>

        <label for="fecha_registro">Fecha de Registro:</label>
        <input id="fecha_registro" name="fecha_registro" type="date"><br><br>

        <label for="id_docente">ID Docente:</label>
        <input id="id_docente" name="id_docente" type="number"><br><br>

        <input id="btn_guardar" type="submit" value="Guardar">
        <input type="reset" value="Cancelar">
    </form>

    <script src="notas_post.js"></script>
</body>
</html>
