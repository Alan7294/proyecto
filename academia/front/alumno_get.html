<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Lista de Alumnos</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
display:flex;
background:#f4f6f9;
}

.sidebar{
width:230px;
height:100vh;
background:#1e293b;
color:white;
padding:20px;
}

.sidebar a{
display:block;
color:white;
text-decoration:none;
padding:10px;
margin:5px 0;
border-radius:5px;
}

.sidebar a:hover{
background:#334155;
}

.main{
flex:1;
padding:30px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
padding:12px;
border-bottom:1px solid #ddd;
text-align:center;
}

th{
background:#2563eb;
color:white;
}

button{
padding:8px 15px;
border:none;
border-radius:5px;
background:#2563eb;
color:white;
cursor:pointer;
}

.delete{
background:#dc2626;
}

</style>

</head>

<body>

<div class="sidebar">

<h2>Sistema U</h2>

<a href="alumno_get.html">Alumnos</a>
<a href="alumno_post.html">Registrar Alumno</a>

</div>

<div class="main">

<h1>Lista de Alumnos</h1>

<div class="card">

<button onclick="cargarAlumnos()">Actualizar Lista</button>

<table>

<thead>
<tr>
<th>ID Alumno</th>
<th>ID Persona</th>
<th>ID Carrera</th>
<th>Acciones</th>
</tr>
</thead>

<tbody id="tablaAlumnos"></tbody>

</table>

</div>

</div>

<script src="alumno_get.js"></script>

</body>
</html>
