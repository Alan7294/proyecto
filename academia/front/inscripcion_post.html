<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Inscripción</title>
</head>
<body>
    <form name="formularioData" action="" method="post">
        <h1>Registro de Inscripción</h1>
        
        <label for="id_alumno">ID Alumno:</label>
        <input id="id_alumno" name="id_alumno" type="number"><br><br>

        <label for="id_clase">ID Clase:</label>
        <input id="id_clase" name="id_clase" type="number"><br><br>

        <label for="fecha_inscripcion">Fecha de Inscripción:</label>
        <input id="fecha_inscripcion" name="fecha_inscripcion" type="date"><br><br>

        <input id="btn_guardar" type="submit" value="Guardar">
        <input type="reset" value="Cancelar">
    </form>

    <script src="inscripcion_post.js"></script>
</body>
</html>
