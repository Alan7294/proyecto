<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Registro de Usuario</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
padding:40px;
}

.card{
background:white;
padding:30px;
width:400px;
margin:auto;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

input{
width:100%;
padding:10px;
margin-top:10px;
margin-bottom:20px;
border:1px solid #ccc;
border-radius:5px;
}

button{
padding:10px 20px;
border:none;
background:#2563eb;
color:white;
border-radius:5px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="card">

<h2>Registro de Usuario</h2>

<form name="formularioData">

<label>ID Persona</label>
<input id="id_persona" type="number" required>

<label>Nombre Usuario</label>
<input id="nombre_usuario" type="text" required>

<label>Contraseña</label>
<input id="contraseña" type="password" required>

<label>Tipo Usuario</label>
<input id="id_tipo" type="number" required>

<button type="submit">Guardar</button>

</form>

<br>

<a href="usuario_get.html">
<button>Volver a la lista</button>
</a>

</div>

<script src="usuario_post.js"></script>

</body>
</html>
