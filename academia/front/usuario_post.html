<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Usuario</title>
</head>
<body>
    <form name="formularioData" action="" method="post">
        <h1>Registro de Usuario</h1>
        
        <label for="id_persona">ID Persona:</label>
        <input id="id_persona" name="id_persona" type="number"><br><br>

        <label for="nombre_usuario">Nombre de Usuario:</label>
        <input id="nombre_usuario" name="nombre_usuario" type="text"><br><br>

        <label for="contraseña">Contraseña:</label>
        <input id="contraseña" name="contraseña" type="password"><br><br>

        <label for="id_tipo">ID Tipo Usuario:</label>
        <input id="id_tipo" name="id_tipo" type="number"><br><br>

        <input id="btn_guardar" type="submit" value="Guardar">
        <input type="reset" value="Cancelar">
    </form>

    <script src="usuario_post.js"></script>
</body>
</html>
