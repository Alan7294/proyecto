<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Lista de Personas</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
display:flex;
background:#f4f6f9;
}

/* SIDEBAR */

.sidebar{
width:230px;
height:100vh;
background:#1e293b;
color:white;
padding:20px;
}

.sidebar h2{
margin-bottom:30px;
text-align:center;
}

.sidebar a{
display:block;
color:white;
text-decoration:none;
padding:10px;
margin:5px 0;
border-radius:5px;
}

.sidebar a:hover{
background:#334155;
}

/* CONTENIDO */

.main{
flex:1;
padding:30px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

/* BUSCADOR */

#buscador{
width:100%;
padding:10px;
margin:10px 0 20px 0;
border-radius:5px;
border:1px solid #ccc;
}

button{
padding:8px 15px;
border:none;
border-radius:5px;
background:#2563eb;
color:white;
cursor:pointer;
margin-bottom:10px;
}

li{
list-style:none;
padding:10px;
border-bottom:1px solid #ddd;
}

</style>

</head>

<body>

<div class="sidebar">

<h2>Sistema U</h2>

<a href="persona_get.html">Personas</a>
<a href="persona_post.html">Registrar Persona</a>

</div>

<div class="main">

<h1>Lista de Personas</h1>

<div class="card">

<button onclick="cargarPersonas()">Actualizar Lista</button>

<input type="text" id="buscador" placeholder="Buscar persona por nombre o CI">

<div id="listado">
<ul id="data"></ul>
</div>

</div>

</div>

<script src="persona_get.js"></script>

</body>
</html>
