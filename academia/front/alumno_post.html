<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Registrar Alumno</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
display:flex;
background:#f4f6f9;
}

/* SIDEBAR */

.sidebar{
width:230px;
height:100vh;
background:#1e293b;
color:white;
padding:20px;
}

.sidebar h2{
margin-bottom:30px;
text-align:center;
}

.sidebar a{
display:block;
color:white;
text-decoration:none;
padding:10px;
margin:5px 0;
border-radius:5px;
}

.sidebar a:hover{
background:#334155;
}

/* CONTENIDO */

.main{
flex:1;
padding:30px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
width:400px;
}

input{
width:100%;
padding:10px;
margin-top:10px;
margin-bottom:20px;
border:1px solid #ccc;
border-radius:5px;
}

button{
padding:10px 20px;
border:none;
border-radius:5px;
background:#2563eb;
color:white;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

</style>
</head>

<body>

<div class="sidebar">

<h2>Sistema U</h2>

<a href="alumno_get.html">Lista Alumnos</a>
<a href="alumno_post.html">Registrar Alumno</a>

</div>

<div class="main">

<div class="card">

<h2>Registro de Alumno</h2>

<form name="formularioData">

<label>ID Persona</label>
<input id="id_persona" type="number" required>

<label>ID Carrera</label>
<input id="carrera_alumno" type="number" required>

<button type="submit">Guardar</button>

</form>

</div>

</div>

<script src="alumno_post.js"></script>

</body>
</html>
